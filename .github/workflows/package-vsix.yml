name: Package VSIX

on:
  workflow_dispatch:
    inputs:
      mpl_repository:
        description: "Repository to checkout for mpl-lang, as owner/repo"
        required: false
        default: "mpl-lang-tools/mpl-analyzer"
      mpl_ref:
        description: "Branch, tag, or SHA to checkout from the mpl-lang repository"
        required: false
        default: "main"
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: package-vsix-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

env:
  MPL_REPOSITORY: ${{ github.event.inputs.mpl_repository || vars.MPL_REPOSITORY || 'mpl-lang-tools/mpl-analyzer' }}
  MPL_REF: ${{ github.event.inputs.mpl_ref || vars.MPL_REF || 'main' }}

jobs:
  package-vsix:
    name: ${{ matrix.vscode-target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vscode-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            vscode-target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            vscode-target: linux-armhf
            rust-target: armv7-unknown-linux-gnueabihf
          - os: ubuntu-latest
            vscode-target: alpine-x64
            rust-target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            vscode-target: alpine-arm64
            rust-target: aarch64-unknown-linux-musl
          - os: macos-15-intel
            vscode-target: darwin-x64
            rust-target: x86_64-apple-darwin
          - os: macos-14
            vscode-target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-2022
            vscode-target: win32-x64
            rust-target: x86_64-pc-windows-msvc
          - os: windows-2022
            vscode-target: win32-arm64
            rust-target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout extension
        uses: actions/checkout@v7

      - name: Checkout mpl-lang
        uses: actions/checkout@v7
        with:
          repository: ${{ env.MPL_REPOSITORY }}
          ref: ${{ env.MPL_REF }}
          path: mpl

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.rust-target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install extension dependencies
        run: npm ci

      - name: Install Linux ARMHF linker
        if: matrix.rust-target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build language server
        id: build-lsp
        working-directory: mpl
        run: |
          set -euo pipefail

          features=()
          if [ -f crates/mpl-lsp/Cargo.toml ]; then
            manifest_path=crates/mpl-lsp/Cargo.toml
          elif [ -f extra/mpl-language-server/Cargo.toml ]; then
            manifest_path=extra/mpl-language-server/Cargo.toml
            features=(--features lsp-bin)
          else
            echo "Could not find an mpl-lsp Cargo manifest" >&2
            exit 1
          fi

          cargo build \
            --release \
            --manifest-path "$manifest_path" \
            --bin mpl-lsp \
            "${features[@]}" \
            --target "${{ matrix.rust-target }}" \
            --message-format=json \
            | tee cargo-build.jsonl

          binary="$(
            jq -r '
              select(.reason == "compiler-artifact")
              | select(.target.name == "mpl-lsp")
              | select(.executable != null)
              | .executable
            ' cargo-build.jsonl | tail -n 1
          )"

          if [ -z "$binary" ] || [ ! -f "$binary" ]; then
            echo "Could not find built mpl-lsp executable in Cargo JSON output" >&2
            exit 1
          fi

          echo "binary=$binary" >> "$GITHUB_OUTPUT"
        shell: bash
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: rust-lld

      - name: Type-check extension
        run: npm run check

      - name: Build extension
        run: npm run build

      - name: Stage language server
        run: npm run stage -- "${{ steps.build-lsp.outputs.binary }}"
        shell: bash

      - name: Package VSIX
        run: npm run package -- --target "${{ matrix.vscode-target }}" --out "mpl-vscode-${{ matrix.vscode-target }}.vsix"
        shell: bash

      - name: Upload VSIX
        id: upload-vsix
        uses: actions/upload-artifact@v7
        with:
          name: mpl-vscode-${{ matrix.vscode-target }}
          path: mpl-vscode-${{ matrix.vscode-target }}.vsix
          if-no-files-found: error

      - name: Add artifact link to summary
        if: steps.upload-vsix.outputs.artifact-url != ''
        run: |
          echo "### VSIX artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- [mpl-vscode-${{ matrix.vscode-target }}](${{ steps.upload-vsix.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    name: publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: [package-vsix]
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: mpl-vscode-*
          merge-multiple: true

      - name: Upload VSIX files to GitHub Release
        run: |
          set -euo pipefail

          if ! compgen -G "release-assets/*.vsix" > /dev/null; then
            echo "No VSIX files were downloaded from workflow artifacts" >&2
            find release-assets -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi

          release_tag=latest

          if gh api "repos/$GH_REPO/git/ref/tags/$release_tag" > /dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/$GH_REPO/git/refs/tags/$release_tag" \
              -f sha="$GITHUB_SHA" \
              -F force=true \
              > /dev/null
          else
            gh api \
              --method POST \
              "repos/$GH_REPO/git/refs" \
              -f ref="refs/tags/$release_tag" \
              -f sha="$GITHUB_SHA" \
              > /dev/null
          fi

          if gh release view "$release_tag" > /dev/null 2>&1; then
            gh release edit "$release_tag" \
              --title "Latest build" \
              --notes "Rolling prerelease built from the latest successful workflow run." \
              --prerelease
          else
            gh release create "$release_tag" \
              --verify-tag \
              --title "Latest build" \
              --notes "Rolling prerelease built from the latest successful workflow run." \
              --prerelease
          fi

          gh release upload "$release_tag" release-assets/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
